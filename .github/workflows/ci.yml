name: IntelliThreat System CI/CD Pipeline

on:
  push:
    branches: [ main, master, dev ]
  pull_request:
    branches: [ main, master, dev ]

jobs:
  backend-ci:
    name: Backend ML & API Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Backend Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r Backend/requirements.txt

      - name: Verify ML Artifacts Existence
        run: |
          python -c "import os; assert os.path.exists('Model/ModelTraining/optimized_ensemble_model.pkl'), 'Model file missing!'"
          python -c "import os; assert os.path.exists('Model/FeatureEngineering/scaler.pkl'), 'Scaler file missing!'"
          python -c "import os; assert os.path.exists('Model/FeatureEngineering/role_encoder.pkl'), 'Role encoder missing!'"

      - name: Run ML Inference Unit Tests
        run: |
          python Backend/test_predict.py

  frontend-ci:
    name: Frontend React & Vite Build Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm install --legacy-peer-deps

      - name: Verify Production Vite Build
        run: |
          cd frontend
          npm run build || npx vite build
